<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Statement of Account · Caflat.CORE</title>
<link rel="icon" href="./favicon.png" type="image/png" sizes="32x32" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0a09; --card: #171412; --border: rgba(255,255,255,.08);
    --text: #f4f2ee; --dim: rgba(244,242,238,.55); --faint: rgba(244,242,238,.32);
    --gold: #c8a96e; --green: #3dbd7a; --amber: #e0985c; --red: #e05c5c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: radial-gradient(ellipse 120% 60% at 50% -10%, #1a1512 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    padding: max(20px, env(safe-area-inset-top)) 18px 40px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  .brandbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .brand { font-size: .95rem; font-weight: 800; letter-spacing: -.01em; }
  .brand span { color: var(--gold); }
  .badge {
    font-size: .6rem; font-weight: 800; letter-spacing: .14em;
    color: var(--dim); border: 1px solid var(--border); border-radius: 999px; padding: 5px 11px;
    text-transform: uppercase;
  }

  .hello { font-size: .78rem; color: var(--dim); margin-bottom: 4px; }
  .clientname { font-size: 1.3rem; font-weight: 900; letter-spacing: -.02em; margin-bottom: 18px; }

  .totalcard {
    background: var(--card); border: 1px solid var(--border); border-radius: 18px;
    padding: 20px 20px 18px; margin-bottom: 14px;
  }
  .totalcard .k { font-size: .64rem; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--faint); margin-bottom: 6px; }
  .totalcard .v { font-size: 2.4rem; font-weight: 900; letter-spacing: -.03em;
    font-variant-numeric: tabular-nums; }
  .totalcard .v.paid { color: var(--green); }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px 16px;
  }
  .card .k { font-size: .58rem; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--faint); margin-bottom: 7px; }
  .card .v { font-size: 1.2rem; font-weight: 800; font-variant-numeric: tabular-nums; }
  .card .v.warn { color: var(--amber); }
  .card .v.danger { color: var(--red); }

  .sectionlabel { font-size: .62rem; font-weight: 800; letter-spacing: .14em;
    text-transform: uppercase; color: var(--faint); margin: 20px 0 10px; }

  .invoice-list { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .invoice-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 16px; border-bottom: 1px solid var(--border);
  }
  .invoice-row:last-child { border-bottom: none; }
  .invoice-row .inv-num { font-size: .82rem; font-weight: 700; }
  .invoice-row .inv-date { font-size: .68rem; color: var(--faint); margin-top: 2px; }
  .invoice-row .inv-amt { font-size: .9rem; font-weight: 800; font-variant-numeric: tabular-nums; text-align: right; }
  .inv-age { font-size: .62rem; font-weight: 700; margin-top: 2px; text-align: right; }
  .inv-age.ok { color: var(--dim); }
  .inv-age.warn { color: var(--amber); }
  .inv-age.danger { color: var(--red); }

  .paycard {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px; margin-top: 14px; text-align: center;
  }
  .paycard img { max-width: 200px; width: 100%; border-radius: 10px; margin-top: 10px; }
  .paycard .pname { font-size: .78rem; font-weight: 700; color: var(--dim); }

  .updated { text-align: center; font-size: .64rem; color: var(--faint); margin-top: 18px; }
  .foot { text-align: center; font-size: .6rem; letter-spacing: .18em; text-transform: uppercase;
    color: var(--faint); margin-top: 26px; }
  .foot b { color: var(--gold); }

  .state { text-align: center; padding: 80px 20px; }
  .state h2 { font-size: 1.1rem; font-weight: 800; margin-bottom: 8px; }
  .state p { font-size: .82rem; color: var(--dim); line-height: 1.6; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brandbar">
    <div class="brand" id="brandName">Caflat<span>.CORE</span></div>
    <div class="badge">Statement</div>
  </div>

  <div id="loading" class="state"><p>Loading statement…</p></div>

  <div id="errorState" class="state hidden">
    <h2>This link isn't active</h2>
    <p>It may have been revoked or mistyped. Ask your supplier for a fresh
       statement link.</p>
  </div>

  <div id="stmt" class="hidden">
    <div class="hello" id="helloLine">Statement of Account</div>
    <div class="clientname" id="clientName">&nbsp;</div>

    <div class="totalcard">
      <div class="k">Total Outstanding</div>
      <div class="v" id="kTotal">₱0</div>
    </div>

    <div class="grid">
      <div class="card"><div class="k">Current</div><div class="v" id="bCurrent">₱0</div></div>
      <div class="card"><div class="k">1&ndash;30 Days</div><div class="v" id="b130">₱0</div></div>
      <div class="card"><div class="k">31&ndash;60 Days</div><div class="v warn" id="b3160">₱0</div></div>
      <div class="card"><div class="k">60+ Days</div><div class="v danger" id="b60">₱0</div></div>
    </div>

    <div class="sectionlabel">Invoices</div>
    <div id="invoiceList" class="invoice-list"></div>

    <div id="payWrap"></div>

    <div class="updated" id="updatedAt"></div>
  </div>

  <div class="foot">Powered by <b>Caflat.CORE</b></div>
</div>

<script>
  const SB_URL  = 'https://tkrsebalgonimmozbgqc.supabase.co';
  const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrcnNlYmFsZ29uaW1tb3piZ3FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMjc5NzEsImV4cCI6MjA5NzYwMzk3MX0.OKp5NCLYnL-5CFWnvXpA2E78jNi5r63Jzs2zABAkzsw';

  const token = (location.hash || '').replace(/^#/, '').trim();
  const peso  = n => '₱' + Number(n || 0).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const $     = id => document.getElementById(id);

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function show(which) {
    ['loading', 'errorState', 'stmt'].forEach(id =>
      $(id).classList.toggle('hidden', id !== which));
  }

  function ageClass(days) {
    return days > 60 ? 'danger' : days > 30 ? 'warn' : 'ok';
  }

  function render(data) {
    if (data.brand) {
      $('brandName').innerHTML = `${escapeHtml(data.brand)}`;
      document.title = `Statement · ${data.brand}`;
    }
    $('clientName').textContent = data.clientName || 'Statement of Account';

    const total = Number(data.total || 0);
    $('kTotal').textContent = peso(total);
    if (total <= 0) $('kTotal').classList.add('paid');

    const b = data.buckets || {};
    $('bCurrent').textContent = peso(b.current);
    $('b130').textContent     = peso(b['1-30']);
    $('b3160').textContent    = peso(b['31-60']);
    $('b60').textContent      = peso(b['60+']);

    const items = Array.isArray(data.items) ? data.items : [];
    $('invoiceList').innerHTML = items.length
      ? items.map(i => `
        <div class="invoice-row">
          <div>
            <div class="inv-num">${escapeHtml(i.invoiceNumber)}</div>
            <div class="inv-date">${i.invoicedAt ? new Date(i.invoicedAt).toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' }) : ''}</div>
          </div>
          <div>
            <div class="inv-amt">${peso(i.amount)}</div>
            <div class="inv-age ${ageClass(Number(i.ageDays || 0))}">${Number(i.ageDays || 0)}d</div>
          </div>
        </div>`).join('')
      : `<div class="invoice-row"><div class="inv-num" style="color:var(--dim);font-weight:600;">No outstanding invoices — fully paid up</div></div>`;

    const paymentInfo = Array.isArray(data.paymentInfo) ? data.paymentInfo : [];
    $('payWrap').innerHTML = paymentInfo.length
      ? `<div class="sectionlabel">Payment</div>` + paymentInfo.map(p => `
        <div class="paycard">
          <div class="pname">${escapeHtml(p.name || 'Scan to pay')}</div>
          ${p.qrImage ? `<img src="${p.qrImage}" alt="${escapeHtml(p.name || 'Payment QR')}" />` : ''}
        </div>`).join('')
      : '';

    if (data.generatedAt) {
      $('updatedAt').textContent = 'Updated ' + new Date(data.generatedAt).toLocaleString('en-PH',
        { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
    }
    show('stmt');
  }

  async function load() {
    if (!token) { show('errorState'); return; }
    try {
      const res = await fetch(`${SB_URL}/rest/v1/rpc/get_client_statement`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SB_ANON,
          'Authorization': `Bearer ${SB_ANON}`,
        },
        body: JSON.stringify({ p_token: token }),
      });
      const data = await res.json();
      if (!res.ok || !data || data.ok !== true) { show('errorState'); return; }
      render(data.statement || {});
    } catch (e) {
      if ($('stmt').classList.contains('hidden')) show('errorState');
    }
  }

  load();
  // Token lives in the hash; swapping it must re-evaluate from scratch
  window.addEventListener('hashchange', () => location.reload());
</script>
</body>
</html>
