<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1050" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0b"/>
      <stop offset=".55" stop-color="#110d09"/>
      <stop offset="1" stop-color="#0a0a0b"/>
    </linearGradient>
    <radialGradient id="lamp" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#c8a375" stop-opacity=".22"/>
      <stop offset=".5" stop-color="#c8a375" stop-opacity=".07"/>
      <stop offset="1" stop-color="#c8a375" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="counter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#221610"/>
      <stop offset=".14" stop-color="#170f0a"/>
      <stop offset="1" stop-color="#0a0a0b"/>
    </linearGradient>
    <linearGradient id="rimV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c8a375" stop-opacity=".5"/>
      <stop offset="1" stop-color="#c8a375" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a0a0b"/>
      <stop offset=".6" stop-color="#0a0a0b" stop-opacity=".7"/>
      <stop offset="1" stop-color="#0a0a0b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1050" fill="url(#sky)"/>

  <!-- far bokeh — out-of-focus café lights, very dim -->
  <circle cx="220" cy="300" r="40" fill="#c8a375" opacity=".04"/>
  <circle cx="360" cy="210" r="22" fill="#e9c98a" opacity=".04"/>
  <circle cx="120" cy="470" r="26" fill="#c8a375" opacity=".03"/>
  <circle cx="520" cy="330" r="16" fill="#f0ddc0" opacity=".04"/>

  <!-- pendant lamp above the machine -->
  <line x1="1485" y1="0" x2="1485" y2="238" stroke="#1e1610" stroke-width="4"/>
  <path d="M1449 238 L1521 238 L1505 280 L1465 280 Z" fill="#161009" stroke="rgba(200,163,117,.38)" stroke-width="1.5"/>
  <ellipse cx="1485" cy="287" rx="15" ry="5" fill="#e9c98a" opacity=".5"/>
  <circle cx="1485" cy="430" r="215" fill="url(#lamp)"/>

  <!-- counter -->
  <rect x="0" y="700" width="1600" height="350" fill="url(#counter)"/>
  <line x1="0" y1="700" x2="1600" y2="700" stroke="rgba(200,163,117,.25)" stroke-width="2"/>
  <ellipse cx="1485" cy="718" rx="300" ry="20" fill="#c8a375" opacity=".06"/>

  <!-- ══ espresso machine — bleeds off the right edge, ambient ══ -->
  <g transform="translate(260 0)">
    <!-- body -->
    <rect x="1060" y="470" width="330" height="178" rx="14" fill="#161009"/>
    <!-- top cup-warmer tray -->
    <rect x="1048" y="448" width="354" height="30" rx="10" fill="#1c120b"/>
    <line x1="1052" y1="450" x2="1398" y2="450" stroke="rgba(200,163,117,.55)" stroke-width="2.5"/>
    <!-- brand strip -->
    <rect x="1060" y="490" width="330" height="7" fill="rgba(200,163,117,.18)"/>
    <!-- gauge -->
    <circle cx="1225" cy="532" r="21" fill="#0e0906" stroke="rgba(200,163,117,.45)" stroke-width="2"/>
    <line x1="1225" y1="532" x2="1236" y2="521" stroke="rgba(233,201,138,.65)" stroke-width="2"/>
    <!-- group heads + portafilters -->
    <g>
      <rect x="1108" y="580" width="76" height="34" rx="7" fill="#1f1409"/>
      <rect x="1270" y="580" width="76" height="34" rx="7" fill="#1f1409"/>
      <line x1="1110" y1="582" x2="1182" y2="582" stroke="rgba(200,163,117,.35)" stroke-width="1.5"/>
      <line x1="1272" y1="582" x2="1344" y2="582" stroke="rgba(200,163,117,.35)" stroke-width="1.5"/>
      <rect x="1128" y="614" width="36" height="10" rx="5" fill="#221610"/>
      <rect x="1290" y="614" width="36" height="10" rx="5" fill="#221610"/>
      <rect x="1141" y="624" width="10" height="18" rx="3" fill="#1c120b"/>
      <rect x="1303" y="624" width="10" height="18" rx="3" fill="#1c120b"/>
    </g>
    <!-- steam wand -->
    <path d="M1390 550 q34 8 40 52 l-8 46" fill="none" stroke="#221610" stroke-width="9" stroke-linecap="round"/>
    <!-- rim lights -->
    <rect x="1387" y="470" width="3" height="152" fill="url(#rimV)"/>
    <rect x="1060" y="470" width="3" height="132" fill="url(#rimV)" opacity=".5"/>
    <!-- drip tray + legs -->
    <rect x="1070" y="672" width="310" height="14" rx="6" fill="#170f0a"/>
    <line x1="1074" y1="674" x2="1376" y2="674" stroke="rgba(200,163,117,.28)" stroke-width="1.5"/>
    <rect x="1088" y="686" width="18" height="14" rx="3" fill="#110b07"/>
    <rect x="1344" y="686" width="18" height="14" rx="3" fill="#110b07"/>
    <!-- cups under the group heads + espresso streams -->
    <g fill="#1c120b" stroke="rgba(200,163,117,.45)" stroke-width="1.5">
      <path d="M1126 654 h40 v18 a12 12 0 0 1 -12 12 h-16 a12 12 0 0 1 -12 -12 Z"/>
      <path d="M1288 654 h40 v18 a12 12 0 0 1 -12 12 h-16 a12 12 0 0 1 -12 -12 Z"/>
    </g>
    <line x1="1146" y1="642" x2="1146" y2="654" stroke="rgba(233,201,138,.45)" stroke-width="2.5"/>
    <line x1="1308" y1="642" x2="1308" y2="654" stroke="rgba(233,201,138,.45)" stroke-width="2.5"/>
  </g>

  <!-- left fade keeps the text side clean -->
  <rect width="1080" height="1050" fill="url(#fadeL)"/>
</svg>
